<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Karaoke Vote 歌唱登録</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      margin: 20px;
      background: #f7f7f7;
    }

    .card {
      background: white;
      padding: 16px;
      margin-bottom: 20px;
      border-radius: 8px;
      border: 1px solid #ddd;
    }

    .inline-form {
      display: flex;
      gap: 12px;
      align-items: end;
      flex-wrap: nowrap;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 4px;
      font-size: 14px;
    }

    .wide input {
      width: 220px;
    }

    .short input,
    .short select {
      width: 110px;
    }

    input, select, button {
      font-size: 16px;
      padding: 6px;
    }

    button {
      cursor: pointer;
    }

    .table-area {
      max-height: 430px;
      overflow-y: auto;
      border: 1px solid #ccc;
      background: white;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead th {
      position: sticky;
      top: 0;
      background: #333;
      color: white;
      z-index: 1;
    }

    th, td {
      border-bottom: 1px solid #ddd;
      padding: 8px;
      text-align: left;
      font-size: 14px;
    }

    th.sortable {
      cursor: pointer;
      text-decoration: underline;
    }

    .hint {
      color: #666;
      font-size: 13px;
    }

    .actions button {
      margin-right: 4px;
    }
  </style>
</head>

<body>

  <h1>🎤 Karaoke Vote 歌唱登録</h1>

  <section class="card">
    <h2>Excel一括アップロード</h2>
    <input type="file" id="excelFile" accept=".xlsx,.xls">
    <button onclick="uploadExcel()">アップロード</button>
    <p class="hint">Excel列名：ニックネーム、曲名、原曲歌手、Key、希望順位</p>
  </section>

  <section class="card">
    <h2>新規登録</h2>

    <div class="inline-form">
      <label class="field wide">
        ニックネーム
        <input id="singer" type="text">
      </label>

      <label class="field wide">
        曲名
        <input id="song" type="text">
      </label>

      <label class="field wide">
        原曲歌手
        <input id="originSinger" type="text">
      </label>

      <label class="field short">
        Key
        <input id="key" type="text" placeholder="+2">
      </label>

      <label class="field short">
        希望順位
        <select id="choiceRank">
          <option value="1">1</option>
          <option value="2">2</option>
          <option value="3">3</option>
        </select>
      </label>

      <button onclick="createEntry()">登録</button>
      <button onclick="clearForm()">クリア</button>
    </div>
  </section>

  <section class="card">
    <h2>登録済み一覧</h2>

    <p>
      並び替え：
      <button onclick="sortEntries('singer')">ニックネーム</button>
      <button onclick="sortEntries('choiceRank')">希望順位</button>
      <button onclick="sortEntries('order')">歌唱順</button>
    </p>

    <div class="table-area">
      <table>
        <thead>
          <tr>
            <th class="sortable" onclick="sortEntries('singer')">ニックネーム</th>
            <th>曲名</th>
            <th>原曲歌手</th>
            <th>Key</th>
            <th class="sortable" onclick="sortEntries('choiceRank')">希望順位</th>
            <th class="sortable" onclick="sortEntries('order')">歌唱順</th>
            <th>投票数</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="entryTableBody"></tbody>
      </table>
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <script src="api.js"></script>
  <script src="entry.js"></script>

</body>
</html>
