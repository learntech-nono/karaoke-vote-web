<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>出演者エントリー管理画面</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        input, select { padding: 8px; margin: 5px; width: 300px; }
        button { padding: 10px 20px; margin-top: 10px; }
        table { margin-top: 20px; border-collapse: collapse; width: 100%; }
        th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
        .action-btn { padding: 5px 10px; margin-right: 5px; }
    </style>
</head>
<body>

<h2>出演者エントリー登録</h2>

<form id="entryForm">
    <label>出演者名（ニックネーム）</label><br>
    <input type="text" id="name"><br>

    <label>曲名</label><br>
    <input type="text" id="song"><br>

    <label>原曲歌手名</label><br>
    <input type="text" id="artist"><br>

    <label>KEY</label><br>
    <input type="text" id="key"><br>

    <button type="button" onclick="addEntry()">登録する</button>
</form>

<h3>登録済みエントリー一覧</h3>
<table id="entryTable">
    <tr>
        <th>出演者</th>
        <th>曲名</th>
        <th>原曲歌手名</th>
        <th>KEY</th>
        <th>登録日時</th>
        <th>操作</th>
    </tr>
</table>

<script>
function addEntry() {
    const name = document.getElementById("name").value;
    const song = document.getElementById("song").value;
    const artist = document.getElementById("artist").value;
    const key = document.getElementById("key").value;

    if (!name || !song || !artist || !key) {
        alert("すべての項目を入力してください");
        return;
    }

    const now = new Date().toLocaleString(); // 登録日時

    const table = document.getElementById("entryTable");
    const row = table.insertRow(-1);

    row.insertCell(0).innerText = name;
    row.insertCell(1).innerText = song;
    row.insertCell(2).innerText = artist;
    row.insertCell(3).innerText = key;
    row.insertCell(4).innerText = now;

    // 操作ボタン（編集・削除）
    const actionCell = row.insertCell(5);

    const editBtn = document.createElement("button");
    editBtn.innerText = "編集";
    editBtn.className = "action-btn";
    editBtn.onclick = () => editEntry(row);
    actionCell.appendChild(editBtn);

    const deleteBtn = document.createElement("button");
    deleteBtn.innerText = "削除";
    deleteBtn.className = "action-btn";
    deleteBtn.onclick = () => deleteEntry(row);
    actionCell.appendChild(deleteBtn);

    document.getElementById("entryForm").reset();
}

function editEntry(row) {
    const cells = row.cells;

    const name = prompt("出演者名を編集", cells[0].innerText);
    const song = prompt("曲名を編集", cells[1].innerText);
    const artist = prompt("原曲歌手名を編集", cells[2].innerText);
    const key = prompt("KEYを編集", cells[3].innerText);

    if (name && song && artist && key) {
        cells[0].innerText = name;
        cells[1].innerText = song;
        cells[2].innerText = artist;
        cells[3].innerText = key;
    }
}

function deleteEntry(row) {
    if (confirm("このエントリーを削除しますか？")) {
        row.remove();
    }
}
</script>

</body>
</html>
